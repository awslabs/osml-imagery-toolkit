name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tox:
    if: ${{ !startsWith(github.ref_name, 'v2') }}
    permissions:
      contents: read
    uses: ./.github/workflows/tox.yml
    secrets: inherit
  publish:
    if: ${{ !startsWith(github.ref_name, 'v2') }}
    needs: [tox]
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/pypi.yml
    secrets: inherit
