name: build-v2

on:
  push:
    branches: ["v2"]
  pull_request:
    branches: ["v2"]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Hatch
        run: pip install hatch
      - name: Run tests
        run: hatch run +py=${{ matrix.python-version }} test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Hatch
        run: pip install hatch
      - name: Check formatting
        run: hatch run lint:format-check
      - name: Check linting
        run: hatch run lint:check
